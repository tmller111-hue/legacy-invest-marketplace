<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legacy Invest Realty — Deal Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#eef2f7;--surface:#fff;--surface2:#f5f8fc;--border:#d0dcea;--navy:#1a2d4d;--navy2:#243d66;--gold:#c9a84c;--gold-dark:#a8882e;--blue:#2e6bbf;--text:#1a2d4d;--muted:#6b7e96;--muted2:#b8c8dc;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
.top-bar{background:linear-gradient(135deg,#1a2d4d 0%,#243d66 100%);box-shadow:0 2px 16px rgba(26,45,77,.3);}
.header-inner{max-width:1400px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.logo-area{display:flex;align-items:center;gap:14px;}
.logo-img{height:50px;width:auto;}
.logo-text h1{font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:2px;}
.logo-text h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff;}
.logo-text h2 span{color:#c9a84c;}
.header-right{display:flex;align-items:center;gap:16px;}
.refresh-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:11px;color:rgba(255,255,255,.75);white-space:nowrap;}
.refresh-badge .dot{width:6px;height:6px;border-radius:50%;background:#c9a84c;animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.last-updated{font-size:10px;color:rgba(255,255,255,.4);white-space:nowrap;}

/* Search bar */
.search-wrap{position:relative;width:320px;}
.search-wrap input{width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 14px 8px 38px;font-family:'Inter',sans-serif;font-size:13px;color:#fff;outline:none;transition:all .2s;}
.search-wrap input::placeholder{color:rgba(255,255,255,.4);}
.search-wrap input:focus{background:rgba(255,255,255,.18);border-color:rgba(201,168,76,.6);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);font-size:14px;pointer-events:none;}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:14px;display:none;padding:2px;}
.search-clear.visible{display:block;}

/* Search results banner */
.search-banner{background:var(--navy);color:#fff;padding:10px 24px;font-size:12px;font-weight:500;display:none;align-items:center;justify-content:space-between;}
.search-banner.visible{display:flex;}
.search-banner span{color:var(--gold);}
.search-banner button{background:none;border:1px solid rgba(255,255,255,.2);border-radius:20px;color:rgba(255,255,255,.7);padding:3px 10px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;}
.search-banner button:hover{background:rgba(255,255,255,.1);}

/* Search results grid */
.search-results{display:none;padding:0 24px 24px;}
.search-results.visible{display:block;}
.search-results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;margin-top:12px;}
.search-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0;}
.no-results{text-align:center;padding:48px;color:var(--muted);font-size:13px;}

.page{max-width:1400px;margin:0 auto;padding:20px 24px;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(26,45,77,.07);}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.stat-card.gold::after{background:linear-gradient(90deg,#c9a84c,#e8c96a);}
.stat-card.blue::after{background:linear-gradient(90deg,#2e6bbf,#4a87d9);}
.stat-card.navy::after{background:linear-gradient(90deg,#1a2d4d,#2e6bbf);}
.stat-card.dim::after{background:#d0dcea;}
.stat-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--navy);}
.stat-value.gold{color:#a8882e;}
.stat-value.blue{color:#2e6bbf;}

.pipeline-block{margin-bottom:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(26,45,77,.07);}
.pipeline-header{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:linear-gradient(135deg,#1a2d4d,#243d66);cursor:pointer;user-select:none;}
.pipeline-header:hover{filter:brightness(1.08);}
.pipeline-header-left{display:flex;align-items:center;gap:10px;}
.pipeline-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;}
.pipeline-meta{font-size:11px;color:#c9a84c;font-weight:500;}
.pipeline-chevron{color:#c9a84c;font-size:11px;transition:transform .25s;}
.pipeline-chevron.open{transform:rotate(180deg);}
.pipeline-body{display:none;padding:8px;background:var(--bg);}
.pipeline-body.open{display:block;}

.stage-block{margin-bottom:5px;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.stage-header{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--surface);cursor:pointer;user-select:none;transition:background .15s;}
.stage-header:hover{background:#eef4fc;}
.stage-name{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#2e6bbf;}
.stage-meta{display:flex;align-items:center;gap:6px;}
.stage-badge{background:#eef4fc;border:1px solid #c2d8f4;border-radius:20px;padding:2px 9px;font-size:10px;font-weight:600;color:#2e6bbf;}
.stage-chevron{color:var(--muted);font-size:9px;transition:transform .2s;margin-left:4px;}
.stage-chevron.open{transform:rotate(180deg);}
.stage-deals{padding:5px;background:var(--bg);flex-direction:column;gap:4px;display:none;}
.stage-deals.open{display:flex;}

.deal-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:10px 12px;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .15s;animation:fadeUp .3s ease both;}
.deal-card:hover{border-color:#c9a84c;box-shadow:0 3px 12px rgba(201,168,76,.18);transform:translateY(-1px);}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.deal-card.highlight{border-color:#c9a84c;background:#fdf8ee;}
.deal-title{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.deal-org{font-size:11px;color:var(--muted);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.deal-footer{display:flex;align-items:center;justify-content:space-between;gap:5px;flex-wrap:wrap;}
.deal-value{font-size:13px;font-weight:700;color:#a8882e;}
.deal-value.zero{color:var(--muted);}
.deal-owner{font-size:10px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:1px 7px;border-radius:20px;font-weight:500;}
.deal-age{font-size:10px;color:var(--muted);}
.deal-pipeline-tag{font-size:9px;color:rgba(255,255,255,.8);background:var(--navy);padding:1px 7px;border-radius:20px;font-weight:600;}
.deal-stage-tag{font-size:9px;color:var(--blue);background:#eef4fc;border:1px solid #c2d8f4;padding:1px 7px;border-radius:20px;font-weight:600;}
.deal-tags{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap;}
.deal-tag{font-size:9px;padding:1px 7px;border-radius:20px;font-weight:600;}
.deal-tag.rehab{background:#eef4fc;color:#2e6bbf;border:1px solid #c2d8f4;}
.act-pill{font-size:9px;padding:1px 8px;border-radius:20px;font-weight:600;margin-top:4px;display:inline-block;background:#fef9ec;color:#a07820;border:1px solid #f0d878;}

.owner-section{margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;box-shadow:0 1px 4px rgba(26,45,77,.07);}
.section-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #c9a84c;display:inline-block;}
.owner-bars{display:flex;flex-direction:column;gap:8px;}
.owner-row{display:grid;grid-template-columns:130px 1fr 100px;align-items:center;gap:12px;}
.owner-label{font-size:12px;font-weight:500;color:var(--text);}
.owner-bar-track{background:var(--surface2);border-radius:4px;height:6px;overflow:hidden;border:1px solid var(--border);}
.owner-bar-fill{height:100%;background:linear-gradient(90deg,#1a2d4d,#2e6bbf);border-radius:4px;transition:width .6s ease;}
.owner-val{font-size:11px;color:var(--muted);text-align:right;font-weight:500;}

.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:260px;gap:14px;color:var(--muted);font-size:13px;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:#c9a84c;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-box{background:var(--surface);border:1px solid #fca5a5;border-radius:8px;padding:20px;color:#dc2626;font-size:12px;margin:20px 0;}
footer{padding:16px 0;font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;border-top:1px solid var(--border);margin-top:8px;display:flex;justify-content:space-between;}

/* mark highlight */
mark{background:#fef08a;color:inherit;border-radius:2px;padding:0 1px;}

.drawer-overlay{position:fixed;inset:0;background:rgba(26,45,77,.35);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:580px;max-width:100vw;background:var(--surface);border-left:2px solid var(--border);z-index:101;transform:translateX(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);overflow-y:auto;display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(26,45,77,.15);}
.drawer.open{transform:translateX(0);}
.drawer-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:sticky;top:0;background:linear-gradient(135deg,#1a2d4d,#243d66);z-index:10;}
.drawer-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff;flex:1;line-height:1.3;}
.drawer-subtitle{font-size:11px;color:#c9a84c;margin-top:3px;font-weight:500;}
.drawer-close{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;font-size:15px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.drawer-close:hover{background:rgba(255,255,255,.2);}
.drawer-body{padding:14px 18px;flex:1;background:var(--bg);}
.d-section{margin-bottom:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.d-section-header{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;cursor:pointer;user-select:none;transition:background .15s;}
.d-section-header:hover{background:var(--surface2);}
.d-section-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);}
.d-section-chevron{color:var(--muted);font-size:9px;transition:transform .2s;}
.d-section-chevron.open{transform:rotate(180deg);}
.d-section-body{display:none;padding:10px;border-top:1px solid var(--border);}
.d-section-body.open{display:block;}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.d-field{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 11px;}
.d-field-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.d-field-value{font-size:12px;color:var(--text);line-height:1.4;word-break:break-word;font-weight:500;}
.d-field-value.accent{color:#a8882e;font-weight:700;}
.d-field-value.blue{color:#2e6bbf;font-weight:600;}
.d-field-value a{color:#2e6bbf;text-decoration:none;}
.d-field-value a:hover{text-decoration:underline;}
.d-empty{color:var(--muted2);font-style:italic;font-size:11px;font-weight:400;}
.act-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.act-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
.act-box .num{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--navy);}
.act-box .num.yellow{color:#a8882e;}
.act-box .lbl{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
@media(max-width:700px){.header-inner{gap:12px;}.search-wrap{width:100%;order:3;}.header-right{flex-wrap:wrap;}.drawer{width:100vw;}.d-grid{grid-template-columns:1fr;}.owner-row{grid-template-columns:80px 1fr 65px;}}
</style>
</head>

<script>
const DATA_URL='https://legacyinvest.app.n8n.cloud/webhook/pipedrive-deals';
const REFRESH_MS=60*60*1000;
const OPEN_PIPELINE=3;
let allDeals=[],refreshTimer=null,currentQuery='';

const fmt$=n=>n&&n>0?'$'+n.toLocaleString('en-US',{maximumFractionDigits:0}):'&mdash;';
const fmtDate=s=>{if(!s)return null;const d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});};
const daysAgo=s=>{if(!s)return '';const d=Math.floor((Date.now()-new Date(s))/86400000);return d===0?'today':d===1?'1d ago':d+'d ago';};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function highlight(text, query) {
  if (!query || !text) return esc(String(text||''));
  const safe = query.replace(/[.*+?^${}()|[\]\\]/g,'$&');
  return esc(String(text)).replace(new RegExp('('+safe+')','gi'),'<mark>$1</mark>');
}

function dv(val,cls=''){if(val===null||val===undefined||val==='')return '<span class="d-empty">&mdash;</span>';return `<span class="d-field-value ${cls}">${esc(String(val))}</span>`;}
function field(label,val,cls=''){return `<div class="d-field"><div class="d-field-label">${label}</div>${dv(val,cls)}</div>`;}
let sOS={};
function dsection(id,title,content,open=true){
  const o=sOS[id]!==undefined?sOS[id]:open;
  return `<div class="d-section"><div class="d-section-header" onclick="toggleDS('${id}')"><span class="d-section-title">${title}</span><span class="d-section-chevron ${o?'open':''}">&#9660;</span></div><div class="d-section-body ${o?'open':''}" id="ds-${id}">${content}</div></div>`;
}
function toggleDS(id){const b=document.getElementById('ds-'+id);const c=b.previousElementSibling.querySelector('.d-section-chevron');const o=b.classList.contains('open');b.classList.toggle('open',!o);c.classList.toggle('open',!o);sOS[id]=!o;}

// ── Search ────────────────────────────────────────────────────────
function matchesDeal(deal, q) {
  const lower = q.toLowerCase();
  return [deal.title, deal.org_name, deal.person_name, deal.owner_name, deal.entity,
          deal.buyer, deal.seller, deal.pipeline_name, deal.stage_name,
          deal.lender, deal.closer, deal.rehab_phase, deal.project_manager]
    .some(v => v && String(v).toLowerCase().includes(lower));
}

function onSearch(val) {
  currentQuery = val.trim();
  document.getElementById('searchClear').classList.toggle('visible', currentQuery.length > 0);
  if (!currentQuery) { showMainView(); return; }
  const results = allDeals.filter(d => matchesDeal(d, currentQuery));
  showSearchResults(results, currentQuery);
}

function clearSearch() {
  currentQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  showMainView();
}

function showMainView() {
  document.getElementById('searchBanner').classList.remove('visible');
  document.getElementById('searchResultsWrap').classList.remove('visible');
  document.getElementById('mainView').style.display = 'block';
}

function showSearchResults(results, query) {
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('searchBanner').classList.add('visible');
  document.getElementById('searchCount').textContent = results.length;
  document.getElementById('searchTerm').textContent = query;
  document.getElementById('searchResultsWrap').classList.add('visible');

  const grid = document.getElementById('searchResultsGrid');
  if (!results.length) {
    grid.innerHTML = '<div class="no-results">No deals found matching &ldquo;' + esc(query) + '&rdquo;</div>';
    return;
  }

  grid.innerHTML = results.map(deal => {
    const hasVal = deal.value > 0;
    const org = deal.org_name || deal.person_name || '';
    return `<div class="deal-card highlight" onclick="openDrawer(${deal.id})">
      <div style="display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap;">
        <span class="deal-pipeline-tag">${esc(deal.pipeline_name)}</span>
        <span class="deal-stage-tag">${esc(deal.stage_name)}</span>
      </div>
      <div class="deal-title">${highlight(deal.title, query)}</div>
      ${org ? `<div class="deal-org">${highlight(org, query)}</div>` : ''}
      <div class="deal-footer">
        <span class="deal-value ${hasVal?'':'zero'}">${hasVal?fmt$(deal.value):'&mdash;'}</span>
        <span class="deal-age">${daysAgo(deal.add_time)}</span>
        ${deal.owner_name ? `<span class="deal-owner">${highlight(deal.owner_name, query)}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── Render ────────────────────────────────────────────────────────
function dealCardHtml(deal, idx, query='') {
  const hasVal = deal.value > 0;
  const org = deal.org_name || deal.person_name || '';
  const tags = [];
  if(deal.rehab_phase) tags.push(`<span class="deal-tag rehab">${esc(deal.rehab_phase)}</span>`);
  const pending = deal.undone_activities_count || 0;
  return `<div class="deal-card" style="animation-delay:${idx*.03}s" onclick="openDrawer(${deal.id})">
    <div class="deal-title" title="${esc(deal.title)}">${esc(deal.title)}</div>
    ${org ? `<div class="deal-org">${esc(org)}</div>` : ''}
    <div class="deal-footer">
      <span class="deal-value ${hasVal?'':'zero'}">${hasVal?fmt$(deal.value):'&mdash;'}</span>
      <span class="deal-age">${daysAgo(deal.add_time)}</span>
      ${deal.owner_name ? `<span class="deal-owner">${esc(deal.owner_name)}</span>` : ''}
    </div>
    ${tags.length ? `<div class="deal-tags">${tags.join('')}</div>` : ''}
    ${pending ? `<span class="act-pill pending">&#9889; ${pending} pending</span>` : ''}
  </div>`;
}

function render(data) {
  allDeals = data.deals || [];
  const genAt = new Date(data.generated_at || Date.now());
  document.getElementById('lastUpdated').textContent = 'Last sync: '+genAt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+' · '+genAt.toLocaleDateString([],{month:'short',day:'numeric'});
  document.getElementById('footerCount').textContent = allDeals.length+' open deals';

  const totalVal = allDeals.reduce((s,d)=>s+(d.value||0),0);
  const pipeIds = [...new Set(allDeals.map(d=>d.pipeline_id))];
  const ownerSet = [...new Set(allDeals.map(d=>d.owner_name).filter(Boolean))];

  const pipeMap = {};
  allDeals.forEach(deal => {
    const pid=deal.pipeline_id, sid=deal.stage_id;
    if(!pipeMap[pid]) pipeMap[pid]={name:deal.pipeline_name, stages:{}};
    if(!pipeMap[pid].stages[sid]) pipeMap[pid].stages[sid]={name:deal.stage_name, deals:[]};
    pipeMap[pid].stages[sid].deals.push(deal);
  });

  const ownerMap = {};
  allDeals.forEach(d=>{const o=d.owner_name||'Unassigned';if(!ownerMap[o])ownerMap[o]={count:0,value:0};ownerMap[o].count++;ownerMap[o].value+=d.value||0;});
  const ownerList = Object.entries(ownerMap).sort((a,b)=>b[1].value-a[1].value);
  const maxOwnerVal = Math.max(...ownerList.map(o=>o[1].value),1);

  let html = `<div class="stats-row">
    <div class="stat-card gold"><div class="stat-label">Open Deals</div><div class="stat-value gold">${allDeals.length}</div></div>
    <div class="stat-card blue"><div class="stat-label">Pipeline Value</div><div class="stat-value blue">${fmt$(totalVal)}</div></div>
    <div class="stat-card navy"><div class="stat-label">Pipelines</div><div class="stat-value">${pipeIds.length}</div></div>
    <div class="stat-card dim"><div class="stat-label">Owners</div><div class="stat-value">${ownerSet.length}</div></div>
  </div>`;

  Object.entries(pipeMap).forEach(([pid, pipe]) => {
    const pDeals = Object.values(pipe.stages).flatMap(s=>s.deals);
    const pVal = pDeals.reduce((s,d)=>s+(d.value||0),0);
    const pipeId = 'pipe-'+pid;
    const pipeOpen = Number(pid) === OPEN_PIPELINE;

    // Full stage definitions per pipeline — IDs + names confirmed via Pipedrive API
    const PIPELINE_STAGES = {
      3: [
        {id:39, name:'Generating Contract'},
        {id:46, name:'Contract Sent To Buyer'},
        {id:15, name:'Contract Signed/Rehab Not Started'},
        {id:16, name:'Under Renovation'},
        {id:17, name:'Due Diligence/Rehab Complete'},
        {id:18, name:'Pre-Closing'},
      ],
      5: [
        {id:25, name:'Funded'},
        {id:64, name:'Funded W Follow-Ups'},
        {id:71, name:'Follow-Ups Completed'},
        {id:72, name:'Upload to PW'},
        {id:26, name:'Reset'},
      ],
      11: [
        {id:52, name:'Contract/No Pipeline'},
        {id:53, name:'Pipeline Submitted/Bridge'},
        {id:54, name:'Refi - Pre-Closing'},
        {id:55, name:'Purchase - Pre-Closing'},
        {id:56, name:'Cancelled'},
        {id:57, name:'Reset'},
      ],
      13: [
        {id:69, name:'Purchases Closed'},
        {id:70, name:'Refis Closed'},
      ],
      15: [
        {id:83, name:'For Sale'},
      ],
    };

    // Build stage order and pre-populate empty stages from PIPELINE_STAGES
    const pipelineStageDefs = PIPELINE_STAGES[Number(pid)] || [];
    const STAGE_ORDER = pipelineStageDefs.map(s => s.id);

    // Pre-populate empty stages so they always show in order
    pipelineStageDefs.forEach(s => {
      if (!pipe.stages[s.id]) pipe.stages[s.id] = {name: s.name, deals: []};
      else pipe.stages[s.id].name = s.name; // ensure display name is correct
    });

    const stageOrder = STAGE_ORDER;
    const stageEntries = Object.entries(pipe.stages).sort(([a],[b]) => {
      const ai = stageOrder.indexOf(Number(a));
      const bi = stageOrder.indexOf(Number(b));
      if (ai === -1 && bi === -1) return Number(a) - Number(b);
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });

    let stagesHtml = '';
    stageEntries.forEach(([sid, stage]) => {
      const sVal = stage.deals.reduce((s,d)=>s+(d.value||0),0);
      const stageId = 'stage-'+pid+'-'+sid;
      const stageName = stage.name;
      const dealsHtml = stage.deals.map((deal,idx) => dealCardHtml(deal,idx)).join('');
      stagesHtml += `<div class="stage-block">
        <div class="stage-header" onclick="toggleStage('${stageId}')">
          <span class="stage-name">${esc(stageName)}</span>
          <div class="stage-meta">
            <span class="stage-badge">${stage.deals.length} &middot; ${fmt$(sVal)}</span>
            <span class="stage-chevron" id="schev-${stageId}">&#9660;</span>
          </div>
        </div>
        <div class="stage-deals" id="${stageId}">${dealsHtml}</div>
      </div>`;
    });

    html += `<div class="pipeline-block">
      <div class="pipeline-header" onclick="togglePipeline('${pipeId}')">
        <div class="pipeline-header-left">
          <span class="pipeline-name">${esc(pipe.name)}</span>
          <span class="pipeline-meta">${pDeals.length} deals &middot; ${fmt$(pVal)}</span>
        </div>
        <span class="pipeline-chevron ${pipeOpen?'open':''}" id="pchev-${pipeId}">&#9660;</span>
      </div>
      <div class="pipeline-body ${pipeOpen?'open':''}" id="${pipeId}">${stagesHtml}</div>
    </div>`;
  });

  html += `<div class="owner-section"><div class="section-title">By Owner</div><div class="owner-bars">`;
  ownerList.forEach(([name,d]) => {
    const pct = (d.value/maxOwnerVal*100).toFixed(1);
    html += `<div class="owner-row"><div class="owner-label">${esc(name)}</div><div class="owner-bar-track"><div class="owner-bar-fill" style="width:${pct}%"></div></div><div class="owner-val">${d.count} &middot; ${fmt$(d.value)}</div></div>`;
  });
  html += `</div></div><footer><span>Legacy Invest Realty &middot; Pipedrive Dashboard</span><span id="footerCount2">${allDeals.length} open deals</span></footer>`;
  document.getElementById('app').innerHTML = html;

  // Re-run search if active
  if (currentQuery) onSearch(currentQuery);
}

function togglePipeline(id){const b=document.getElementById(id);const c=document.getElementById('pchev-'+id);const o=b.classList.toggle('open');c.classList.toggle('open',o);}
function toggleStage(id){const b=document.getElementById(id);const c=document.getElementById('schev-'+id);const o=b.classList.toggle('open');c.classList.toggle('open',o);}

function openDrawer(dealId) {
  const d = allDeals.find(x=>x.id===dealId); if(!d) return;
  document.getElementById('drawerTitle').textContent = d.title;
  document.getElementById('drawerSubtitle').textContent = [d.stage_name, d.pipeline_name].filter(Boolean).join(' · ');
  document.getElementById('drawerBody').innerHTML =
    dsection('summary','Summary',`<div class="d-grid">${field('Purchase Price',fmt$(d.purchase_price||d.value),'accent')}${field('Closing Date',fmtDate(d.closing_date))}${field('Entity',d.entity)}${field('Owner',d.owner_name)}${field('Buyer',d.buyer||d.person_name)}${field('Organization',d.org_name)}</div>${d.description?`<div class="d-field" style="margin-top:7px"><div class="d-field-label">Rehab Notes</div><div class="d-field-value">${esc(d.description)}</div></div>`:''}`)+
    dsection('activity','Activity',`<div class="act-grid"><div class="act-box"><div class="num yellow">${d.undone_activities_count||0}</div><div class="lbl">Pending</div></div><div class="act-box"><div class="num">${d.done_activities_count||0}</div><div class="lbl">Done</div></div><div class="act-box"><div class="num">${d.email_messages_count||0}</div><div class="lbl">Emails</div></div></div><div class="act-grid" style="margin-top:6px;grid-template-columns:1fr 1fr;"><div class="act-box"><div class="num">${d.notes_count||0}</div><div class="lbl">Notes</div></div><div class="act-box"><div class="num">${d.files_count||0}</div><div class="lbl">Files</div></div></div>`)+
    dsection('closing','Closing & Transaction',`<div class="d-grid">${field('Closer',d.closer)}${field('EM',d.em?fmt$(d.em):null,'blue')}${field('Lender',d.lender)}${field('Seller',d.seller)}${field('Email Team',d.email_team)}${field('Advisor',d.advisor)}</div>${d.rentadoc_portal?`<div class="d-field" style="margin-top:7px"><div class="d-field-label">PandaDoc Portal</div><div class="d-field-value"><a href="${esc(d.rentadoc_portal)}" target="_blank">Open Portal &#8599;</a></div></div>`:''}`)+
    dsection('rehab','Rehab & Management',`<div class="d-grid">${field('Rehab Phase',d.rehab_phase,'blue')}${field('Completion Date',fmtDate(d.completion_date))}${field('Project Manager',d.project_manager)}${field('Home Inspection',fmtDate(d.home_insp_date))}</div>`,false)+
    dsection('property','Property Info',`<div class="d-grid">${field('Bedrooms',d.bedrooms)}${field('Bathrooms',d.bathrooms)}${field('Sq Ft',d.sqft?Number(d.sqft).toLocaleString()+' sqft':null)}${field('Year Built',d.year_built)}${field('Basement',d.basement)}${field('PW Portfolio ID',d.pw_portfolio_id)}</div>`,false)+
    dsection('rental','Rental Info',`<div class="d-grid">${field('Advertised Rent',d.advertised_rent?fmt$(d.advertised_rent)+'/mo':null,'accent')}${field('Guaranteed Rent',d.guaranteed_rent?fmt$(d.guaranteed_rent)+'/mo':null,'accent')}${field('Occupied Rent',d.occupied_rent?fmt$(d.occupied_rent)+'/mo':null)}${field('Rentometer Est.',d.rentometer_rent?fmt$(d.rentometer_rent)+'/mo':null)}</div>`,false)+
    dsection('timeline','Timeline',`<div class="d-grid">${field('Added',fmtDate(d.add_time))}${field('Last Updated',fmtDate(d.update_time))}${field('Days Open',daysAgo(d.add_time))}${field('Closing Date',fmtDate(d.closing_date))}</div>`,false);
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer(){document.getElementById('overlay').classList.remove('open');document.getElementById('drawer').classList.remove('open');}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDrawer(); clearSearch(); }
  if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
});

async function loadData(){
  try{
    const res=await fetch(DATA_URL);
    if(!res.ok) throw new Error('HTTP '+res.status);
    render(await res.json());
  }catch(err){
    document.getElementById('app').innerHTML=`<div class="error-box"><strong>Failed to load deals</strong> ${esc(err.message)}</div>`;
    document.getElementById('lastUpdated').textContent='Load failed';
  }
  if(refreshTimer) clearTimeout(refreshTimer);
  refreshTimer=setTimeout(loadData,REFRESH_MS);
}
loadData();
</script>
