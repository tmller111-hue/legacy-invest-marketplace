<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Legacy Invest Realty — Investment Properties</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="app.css"/>
</head>
<body>
<div id="app">
  <div class="topbar">
    <img src="https://tmller111-hue.github.io/legacy-invest-marketplace/logo.png" alt="Legacy Invest Realty" onerror="this.style.display='none';document.getElementById('logoText').style.display='flex'"/><div id="logoText" style="display:none;align-items:center;gap:8px"><div style="width:32px;height:32px;background:#1a2f5e;border-radius:6px;display:flex;align-items:center;justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" fill="white"/></svg></div><div style="font-family:Playfair Display,serif;font-size:14px;font-weight:700;color:#1a2f5e">LEGACY<span style="color:#c9a227"> INVEST</span> REALTY</div></div>
    <div class="live-dot"><span></span>Live</div>
  </div>
  <div class="toolbar">
    <div class="search-box">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="#aaa" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input id="srch" type="text" placeholder="Search by address, city, or zip..."/>
    </div>
    <button class="filter-btn" onclick="openF()">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      Filters <span id="fbadge" style="display:none;background:#c9a227;color:white;border-radius:10px;padding:1px 6px;font-size:9px;margin-left:2px">0</span>
    </button>
    <select class="sort-sel" id="srt" onchange="render()">
      <option value="pd">Price: High to Low</option>
      <option value="pa">Price: Low to High</option>
      <option value="rd">Rent: High to Low</option>
      <option value="cd">Cap Rate: High to Low</option>
      <option value="fd">Cash Flow: High to Low</option>
    </select>
    <div class="view-btns">
      <button class="vbtn active" id="vb_grid" onclick="setView('grid')" title="Grid">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
      <button class="vbtn" id="vb_list" onclick="setView('list')" title="List">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <button class="vbtn" id="vb_map" onclick="setView('map')" title="Map">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </button>
    </div>
    <span class="results-count" id="rc"></span>
  </div>
  <div class="main"><div id="grid" class="grid-view"><div class="loading">Loading properties...</div></div></div>
</div>

<div class="filter-overlay" id="fo" onclick="closeF()"></div>
<div class="filter-panel" id="fp">
  <div class="filter-header"><h3>Filter Properties</h3><button class="filter-close" onclick="closeF()">&#x2715;</button></div>
  <div class="filter-body">
    <div class="filter-section"><div class="filter-label">Price Range</div>
      <div class="range-row"><input type="number" id="fpMin" placeholder="No Min" oninput="badge()"/><span class="range-sep">to</span><input type="number" id="fpMax" placeholder="No Max" oninput="badge()"/></div>
    </div>
    <div class="filter-section"><div class="filter-label">Bedrooms</div>
      <div class="bb-btns" id="bb_beds">
        <button class="bb-btn active" data-v="0" onclick="bbClick(this,'beds')">Any</button>
        <button class="bb-btn" data-v="1" onclick="bbClick(this,'beds')">1+</button>
        <button class="bb-btn" data-v="2" onclick="bbClick(this,'beds')">2+</button>
        <button class="bb-btn" data-v="3" onclick="bbClick(this,'beds')">3+</button>
        <button class="bb-btn" data-v="4" onclick="bbClick(this,'beds')">4+</button>
        <button class="bb-btn" data-v="5" onclick="bbClick(this,'beds')">5+</button>
      </div>
    </div>
    <div class="filter-section"><div class="filter-label">Bathrooms</div>
      <div class="bb-btns" id="bb_baths">
        <button class="bb-btn active" data-v="0" onclick="bbClick(this,'baths')">Any</button>
        <button class="bb-btn" data-v="1" onclick="bbClick(this,'baths')">1+</button>
        <button class="bb-btn" data-v="1.5" onclick="bbClick(this,'baths')">1.5+</button>
        <button class="bb-btn" data-v="2" onclick="bbClick(this,'baths')">2+</button>
        <button class="bb-btn" data-v="3" onclick="bbClick(this,'baths')">3+</button>
      </div>
    </div>
    <div class="filter-section"><div class="filter-label">Square Feet</div>
      <div class="range-row"><input type="number" id="fsMin" placeholder="No Min" oninput="badge()"/><span class="range-sep">to</span><input type="number" id="fsMax" placeholder="No Max" oninput="badge()"/></div>
    </div>
    <div class="filter-section"><div class="filter-label">Year Built</div>
      <div class="range-row"><input type="number" id="fyMin" placeholder="No Min" oninput="badge()"/><span class="range-sep">to</span><input type="number" id="fyMax" placeholder="No Max" oninput="badge()"/></div>
    </div>
    <div class="filter-section"><div class="filter-label">Status</div>
      <div class="bb-btns" id="st_status">
        <button class="st-btn active-av" data-v="" onclick="stClick(this,'status','active-av')">All</button>
        <button class="st-btn" data-v="available" onclick="stClick(this,'status','active-av')">Available</button>
        <button class="st-btn" data-v="coming-soon" onclick="stClick(this,'status','active-cs')">Coming Soon</button>
        <button class="st-btn" data-v="sold" onclick="stClick(this,'status','active-sl')">Sold</button>
      </div>
    </div>
    <div class="filter-section"><div class="filter-label">Occupancy</div>
      <div class="bb-btns" id="st_occ">
        <button class="st-btn active-oc" data-v="" onclick="stClick(this,'occ','active-oc')">All</button>
        <button class="st-btn" data-v="vacant" onclick="stClick(this,'occ','active-oc')">Vacant</button>
        <button class="st-btn" data-v="rented" onclick="stClick(this,'occ','active-oc')">Rented</button>
        <button class="st-btn" data-v="construction" onclick="stClick(this,'occ','active-oc')">Construction</button>
      </div>
    </div>
  </div>
  <div class="filter-footer">
    <button class="clear-btn" onclick="clearF()">Clear All</button>
    <button class="apply-btn" onclick="render();closeF()">Apply Filters</button>
  </div>
</div>

<div class="overlay" id="dov"><div class="d-wrap" id="dpage"></div></div>
<div class="overlay" id="pov" onclick="if(event.target===this)closeP()"><div class="modal-wrap" id="pmod"></div></div>
<div class="overlay" id="rov" onclick="if(event.target===this)closeR()"><div class="rsv-wrap" id="rmod"></div></div>

<script src="app.js"></script>
</body>
</html>
