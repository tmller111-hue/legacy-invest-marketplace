<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Successful Properties — Rentals</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <div class="brand">Successful Properties</div>
  <nav class="filters">
    <input id="search" type="search" placeholder="City, ZIP, or address" />
    <select id="price">
      <option value="">Any price</option>
      <option value="0-1000">Under $1,000</option>
      <option value="1000-1500">$1,000–$1,500</option>
      <option value="1500-2000">$1,500–$2,000</option>
      <option value="2000-99999">$2,000+</option>
    </select>
    <select id="beds">
      <option value="">Beds</option>
      <option value="1">1+</option>
      <option value="2">2+</option>
      <option value="3">3+</option>
      <option value="4">4+</option>
    </select>
    <select id="baths">
      <option value="">Baths</option>
      <option value="1">1+</option>
      <option value="1.5">1.5+</option>
      <option value="2">2+</option>
    </select>
    <select id="sort">
      <option value="rent-asc">Price: low → high</option>
      <option value="rent-desc">Price: high → low</option>
      <option value="beds-desc">Most beds</option>
      <option value="newest">Newest</option>
    </select>
  </nav>
</header>

<main>
  <div id="map"></div>
  <section id="results">
    <div id="count"></div>
    <div id="cards"></div>
  </section>
</main>

<div id="modal" class="hidden">
  <div class="modal-content">
    <button id="modal-close">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
