<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Legacy Invest — Property Report</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:#f5f4f0;color:#111;font-size:12px;}
html{overflow-x:hidden;}
.action-bar{background:#1a2f5e;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.action-bar h1{color:white;font-size:13px;font-weight:600;flex:1;}
.btn{border:none;border-radius:6px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;}
.btn-pdf{background:#c9a227;color:white;}
.btn-print{background:#555;color:white;}
.btn-back{background:transparent;color:white;border:1px solid rgba(255,255,255,0.4);cursor:pointer;font-family:inherit;border-radius:6px;padding:8px 14px;font-size:12px;}
.btn:disabled{opacity:0.6;cursor:wait;}
@media print{.action-bar{display:none!important;}body{background:white;}}
.wrap{max-width:900px;margin:0 auto;background:white;}
.hero{position:relative;height:220px;overflow:hidden;background:#ddd;}
.hero img{width:100%;height:100%;object-fit:cover;}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1),rgba(0,0,0,.7));}
.hero-txt{position:absolute;bottom:20px;left:22px;color:white;right:22px;}
.hero-txt .pr{font-family:"Playfair Display",serif;font-size:26px;font-weight:700;}
.hero-txt .ad{font-size:11px;opacity:.9;margin-top:3px;}
.edit-bar{background:#1a2f5e;padding:10px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ebt{color:white;font-size:10px;font-weight:700;text-transform:uppercase;margin-right:4px;}
.efg{display:flex;align-items:center;gap:3px;}
.efg label{color:#93c5fd;font-size:9px;text-transform:uppercase;}
.efg input{width:58px;padding:3px 5px;border:1px solid #3b82f6;border-radius:4px;background:#0f172a;color:white;font-size:11px;text-align:center;font-family:inherit;}
.rc-btn{background:#c9a227;color:white;border:none;border-radius:5px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;margin-left:auto;font-family:inherit;}
.sec{padding:16px 22px;border-bottom:1px solid #e5e7eb;}
.stl{font-family:"Playfair Display",serif;font-size:13px;font-weight:700;color:#1a2f5e;margin-bottom:12px;display:flex;align-items:center;gap:5px;}
.stl::after{content:"";flex:1;height:1px;background:#dbeafe;}
.kgrd{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:16px;}
.kb{border-radius:7px;padding:12px;text-align:center;}
.kv{font-family:"Playfair Display",serif;font-size:18px;font-weight:700;}
.kl{font-size:9px;text-transform:uppercase;margin-top:3px;opacity:.8;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.irow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f3f4f6;font-size:11px;}
.il{color:#6b7280;}
.iv{font-weight:600;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:#1a2f5e;color:white;padding:7px 9px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;}
td{padding:5px 9px;border-bottom:1px solid #f0f2f5;text-align:right;}
td:first-child{text-align:center;font-weight:700;}
tr:nth-child(even){background:#f8fafc;}
.proj-chart{height:140px;background:#f8fafc;border-radius:8px;margin-bottom:10px;padding:8px 8px 0;display:flex;align-items:flex-end;gap:3px;}
.chart-btns{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.cbtn{padding:4px 10px;font-size:10px;border-radius:20px;cursor:pointer;font-family:inherit;border:1px solid #ddd;background:white;color:#555;}
.cbtn.on{background:#16a34a;color:white;border-color:#16a34a;}
.cta-sec{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #86efac;border-radius:10px;padding:20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
.res-btn{background:#c9a227;color:white;border:none;border-radius:8px;padding:12px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.foot{padding:16px 22px;display:flex;justify-content:space-between;align-items:center;background:#1a2f5e;color:white;font-size:10px;flex-wrap:wrap;gap:8px;}
/* Reserve form overlay */
.pf-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);z-index:800;overflow-y:auto;}
.pf-overlay.open{display:block;}
.pf-reserve-wrap{background:white;border-radius:12px;max-width:420px;margin:40px auto;padding:22px;border:1px solid #ddd;}
.pf-rfield{margin-bottom:10px;}
.pf-rfield label{display:block;font-size:10px;font-weight:700;color:#333;margin-bottom:4px;text-transform:uppercase;}
.pf-rfield input{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit;color:#111;}
.pf-sub-btn{width:100%;background:#22c55e;color:white;border:none;border-radius:6px;padding:10px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:6px;}
.pf-can-btn{width:100%;background:white;color:#888;border:1px solid #ddd;border-radius:6px;padding:7px;font-size:11px;font-family:inherit;cursor:pointer;margin-top:5px;}
/* Levi loading */
#pfLeviOverlay{display:none;position:fixed;inset:0;background:rgba(10,18,40,0.92);z-index:900;align-items:center;justify-content:center;}
#pfLeviOverlay.open{display:flex;}
.pf-levi-card{background:#fff;border-radius:20px;padding:28px 24px;max-width:340px;width:90%;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.4);}
.pf-levi-avatar{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#1a2f5e,#2d4a8a);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;}
.pf-levi-fact{font-size:12px;color:#222;line-height:1.6;background:#f0f4ff;border-radius:10px;border-left:3px solid #1a2f5e;padding:10px 12px;margin-bottom:16px;text-align:left;min-height:60px;}
.pf-levi-bar-track{background:#eee;border-radius:99px;height:4px;overflow:hidden;margin-bottom:12px;}
.pf-levi-bar{height:100%;background:linear-gradient(90deg,#1a2f5e,#22c55e);border-radius:99px;width:0%;transition:width 0.8s ease;}
.pf-levi-status{font-size:10px;color:#aaa;}
/* Levi chat */
#li-chat-bubble{position:fixed;bottom:24px;right:24px;width:52px;height:52px;background:#1a2f5e;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:700;box-shadow:0 4px 20px rgba(0,0,0,0.25);transition:transform 0.2s;}
#li-chat-bubble:hover{transform:scale(1.08);}
#li-chat-bubble svg{width:24px;height:24px;fill:white;}
#li-chat-bubble .li-chat-badge{position:absolute;top:-3px;right:-3px;background:#22c55e;color:white;font-size:9px;font-weight:700;border-radius:10px;padding:2px 6px;display:none;}
#li-chat-panel{position:fixed;bottom:88px;right:24px;width:360px;max-height:560px;background:white;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.18);z-index:700;display:none;flex-direction:column;overflow:hidden;border:1px solid #e5e7eb;}
#li-chat-panel.open{display:flex;}
#li-chat-header{background:#1a2f5e;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#li-chat-header .li-ch-title{color:white;font-size:13px;font-weight:700;}
#li-chat-header .li-ch-sub{color:rgba(255,255,255,0.65);font-size:10px;margin-top:1px;}
#li-chat-close{background:none;border:none;color:white;opacity:0.7;cursor:pointer;font-size:18px;line-height:1;padding:0;}
#li-chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:0;}
.li-msg{display:flex;gap:8px;align-items:flex-start;}
.li-msg.user{flex-direction:row-reverse;}
.li-msg-bubble{max-width:80%;padding:9px 12px;border-radius:12px;font-size:12px;line-height:1.5;color:#111;}
.li-msg.bot .li-msg-bubble{background:#f1f5f9;border-bottom-left-radius:3px;}
.li-msg.user .li-msg-bubble{background:#1a2f5e;color:white;border-bottom-right-radius:3px;}
.li-typing{display:flex;gap:4px;align-items:center;padding:9px 12px;background:#f1f5f9;border-radius:12px;border-bottom-left-radius:3px;width:fit-content;}
.li-typing span{width:6px;height:6px;background:#94a3b8;border-radius:50%;animation:liBounce 1.2s infinite;}
.li-typing span:nth-child(2){animation-delay:.2s;}
.li-typing span:nth-child(3){animation-delay:.4s;}
@keyframes liBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
#li-chat-input-row{border-top:1px solid #e5e7eb;padding:10px 12px;display:flex;gap:8px;flex-shrink:0;background:white;}
#li-chat-input{flex:1;border:1px solid #e2e8f0;border-radius:8px;padding:8px 11px;font-size:12px;font-family:inherit;resize:none;outline:none;max-height:80px;overflow-y:auto;}
#li-chat-input:focus{border-color:#1a2f5e;}
#li-chat-send{background:#1a2f5e;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#li-chat-send svg{width:16px;height:16px;fill:white;}
@media(max-width:420px){#li-chat-panel{width:calc(100vw - 16px);right:8px;bottom:80px;}}
.loading{text-align:center;padding:80px;font-size:16px;color:#888;}
@media(max-width:600px){.kgrd{grid-template-columns:repeat(2,1fr);}.two{grid-template-columns:1fr;}.edit-bar{flex-direction:column;align-items:flex-start;}}
@media print{.edit-bar{display:none!important;}body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
</style>
</head>
<body>

<div class="action-bar">
  <h1 id="action-title">Legacy Invest — Property Report</h1>
  <button class="btn btn-pdf" id="pdf-btn" onclick="downloadPDF()">&#11015; Download PDF</button>
  <button class="btn btn-print" onclick="window.print()">&#128424; Print</button>
</div>

<div id="report-content">
  <div class="loading">Loading report...</div>
</div>

<script>
const f$ = n => '$' + Math.round(n).toLocaleString();
const fp = n => n.toFixed(2) + '%';
const gi = id => parseFloat(document.getElementById(id)?.value) || 0;
const set = (id, v) => { const e = document.getElementById(id); if(e) e.textContent = v; };

let PROP = null;
let CALC = null;

function calc(p, s) {
  const g = s.rent * (1 - s.vac/100);
  const ma = g * s.mgmt/100, xa = s.rent * s.maintPct/100;
  const noi = g - p.taxes/12 - p.ins - ma - xa;
  const ln = p.price * (1 - s.down/100);
  const r = s.rate/100/12, n = s.term * 12;
  const mo = r > 0 ? ln*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1) : ln/n;
  const net = noi - mo;
  const da = p.price * s.down/100, ca = p.price * s.close/100, oop = da + ca;
  const cap = p.price > 0 ? (noi*12/p.price)*100 : 0;
  const coc = oop > 0 ? (net*12/oop)*100 : 0;
  const irr = Math.max(0, coc*1.75 + cap*0.3);
  return {g, noi, mo, net, ln, oop, cap, coc, irr, da, ca, ma, xa};
}

function buildProjections(p, s, c) {
  const data = [];
  let cumCF = 0;
  const r = s.rate/100/12, n = s.term*12, ln = c.ln;
  for (let yr = 1; yr <= 10; yr++) {
    const rentY = s.rent * Math.pow(1.03, yr-1);
    const grossY = rentY * (1 - s.vac/100);
    const noiY = grossY - (p.taxes/12 * Math.pow(1.02,yr-1)) - (p.ins * Math.pow(1.02,yr-1)) - (grossY*s.mgmt/100) - (rentY*s.maintPct/100);
    const cfY = (noiY - c.mo) * 12;
    cumCF += cfY;
    const propVal = p.price * Math.pow(1.03, yr);
    const appGain = propVal - p.price;
    // Equity paydown: loan balance after yr*12 payments
    const loanBal = r > 0 ? ln * (Math.pow(1+r, n) - Math.pow(1+r, yr*12)) / (Math.pow(1+r, n) - 1) : Math.max(0, ln - c.mo*yr*12);
    const equityGain = (ln - loanBal); // principal paid down
    // Total wealth created = cumulative cash flow + appreciation + equity paydown - initial OOP
    const totalWealth = cumCF + appGain + equityGain;
    data.push({yr, rent:rentY, noi:noiY*12, cf:cfY, cumCF, propVal, appGain, equityGain, totalWealth});
  }
  return data;
}

let PROJ = [];
let PROJ_METRIC = 'cf';
const COLORS = {cf:'#16a34a', cum:'#1a2f5e', val:'#2563eb', tw:'#7c3aed'};

function buildChart() {
  const chart = document.getElementById('proj-chart');
  if (!chart) return;
  const vals = PROJ.map(d => PROJ_METRIC==='cf'?d.cf : PROJ_METRIC==='cum'?d.cumCF : PROJ_METRIC==='tw'?d.totalWealth : d.propVal);
  const maxV = Math.max(...vals.map(Math.abs)) || 1;
  chart.innerHTML = vals.map((v, i) => {
    const h = Math.round(Math.abs(v)/maxV * 110);
    const col = v < 0 ? '#ef4444' : COLORS[PROJ_METRIC];
    const lbl = PROJ_METRIC==='val' ? '$'+Math.round(v/1000)+'k' : '$'+Math.round(Math.abs(v)).toLocaleString();
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px;cursor:pointer;" onclick="hlRow(${PROJ[i].yr})">
      <div style="font-size:8px;color:#555;font-weight:600;">${lbl}</div>
      <div style="width:100%;background:${col};border-radius:3px 3px 0 0;height:${h}px;min-height:3px;transition:all 0.3s;"></div>
      <div style="font-size:8px;color:#888;">Yr ${PROJ[i].yr}</div>
    </div>`;
  }).join('');
}

function projView(m) {
  PROJ_METRIC = m;
  document.querySelectorAll('.cbtn').forEach(b => {
    b.className = 'cbtn' + (b.dataset.m === m ? ' on' : '');
    if (b.dataset.m === m) {
      b.style.background = COLORS[m];
      b.style.borderColor = COLORS[m];
      b.style.color = 'white';
    } else {
      b.style.background = 'white';
      b.style.borderColor = '#ddd';
      b.style.color = '#555';
    }
  });
  buildChart();
}

function hlRow(yr) {
  document.querySelectorAll('#proj-tbody tr').forEach((r, i) => {
    const isSelected = PROJ[i]?.yr === yr;
    r.style.background = isSelected ? '#fef3c7' : (i%2===0 ? '#f8fafc' : 'white');
    r.style.fontWeight = isSelected ? '600' : '';
  });
}

function recalc() {
  if (!PROP) return;
  const s = {
    rent: gi('e_rent'), vac: gi('e_vac'), mgmt: gi('e_mgmt'), maintPct: gi('e_maint'),
    down: gi('e_down'), rate: gi('e_rate'), term: gi('e_term'), close: gi('e_close')
  };
  CALC = calc(PROP, s);
  PROJ = buildProjections(PROP, s, CALC);

  // Update KPIs
  set('r_cf', f$(CALC.net));
  set('r_cap', fp(CALC.cap));
  set('r_coc', fp(CALC.coc));
  set('r_irr', fp(CALC.irr));

  // Update income table
  set('r_rent', f$(s.rent));
  set('r_eff', f$(CALC.g));
  set('r_noi', f$(CALC.noi));
  set('r_mort', f$(CALC.mo));
  const rnt = document.getElementById('r_net');
  if (rnt) { rnt.textContent = f$(CALC.net); rnt.style.color = CALC.net>=0?'#16a34a':'#ef4444'; }

  // Update financing
  set('r_down', f$(CALC.da));
  set('r_close', f$(CALC.ca));
  set('r_oop', f$(CALC.oop));
  set('r_loan', f$(CALC.ln));
  set('r_payment', f$(CALC.mo));

  // Update label suffixes
  const el_vl = document.getElementById('l_vac'); if (el_vl) el_vl.textContent = 'Vacancy ('+s.vac+'%)';
  const el_ml = document.getElementById('l_mgmt'); if (el_ml) el_ml.textContent = 'Mgmt ('+s.mgmt+'%)';
  const el_xl = document.getElementById('l_maint'); if (el_xl) el_xl.textContent = 'Maint ('+s.maintPct+'%)';
  const el_dl = document.getElementById('l_down'); if (el_dl) el_dl.textContent = 'Down ('+s.down+'%)';
  const el_cl = document.getElementById('l_close'); if (el_cl) el_cl.textContent = 'Closing ('+s.close+'%)';

  // Rebuild projection table
  const tbody = document.getElementById('proj-tbody');
  if (tbody) {
    tbody.innerHTML = PROJ.map(d => {
      const cfCol = d.cf>=0?'#16a34a':'#ef4444';
      const cumCol = d.cumCF>=0?'#16a34a':'#ef4444';
      const twCol = d.totalWealth>=0?'#7c3aed':'#ef4444';
      return `<tr onclick="hlRow(${d.yr})" style="cursor:pointer;">
        <td style="text-align:center;font-weight:700;padding:6px 8px;">${d.yr}</td>
        <td style="padding:6px 8px;">${f$(d.rent)}/mo</td>
        <td style="padding:6px 8px;">${f$(d.noi)}/yr</td>
        <td style="font-weight:600;color:${cfCol};padding:6px 8px;">${f$(d.cf)}/yr</td>
        <td style="font-weight:700;color:${cumCol};padding:6px 8px;">${f$(d.cumCF)}</td>
        <td style="padding:6px 8px;">${f$(d.propVal)}</td>
        <td style="color:#2563eb;font-weight:600;padding:6px 8px;">${f$(d.appGain)}</td>
        <td style="color:#0891b2;font-weight:600;padding:6px 8px;">${f$(d.equityGain)}</td>
        <td style="font-weight:700;color:${twCol};padding:6px 8px;">${f$(d.totalWealth)}</td>
      </tr>`;
    }).join('');
  }
  buildChart();
}

function render(p, s) {
  PROP = p;
  CALC = calc(p, s);
  PROJ = buildProjections(p, s, CALC);

  document.title = 'Report — ' + p.addr;
  document.getElementById('action-title').textContent = p.addr + ' · ' + f$(p.price);

  const html = `
  <div class="wrap" id="report-body">
    <div class="hero">
      <img src="${p.photos[0]}" onerror="this.style.display='none'"/>
      <div class="hero-ov"></div>
      <div class="hero-txt">
        <div class="pr">${f$(p.price)}</div>
        <div class="ad">${p.addr}, ${p.city}, ${p.state} ${p.zip}</div>
      </div>
    </div>

    <div class="edit-bar">
      <span class="ebt">Edit Assumptions</span>
      <div class="efg"><label>Rent</label><input id="e_rent" type="number" value="${s.rent}"/></div>
      <div class="efg"><label>Vac%</label><input id="e_vac" type="number" value="${s.vac}"/></div>
      <div class="efg"><label>Mgmt%</label><input id="e_mgmt" type="number" value="${s.mgmt}"/></div>
      <div class="efg"><label>Maint%</label><input id="e_maint" type="number" value="${s.maintPct}"/></div>
      <div class="efg"><label>Down%</label><input id="e_down" type="number" value="${s.down}"/></div>
      <div class="efg"><label>Rate%</label><input id="e_rate" type="number" value="${s.rate}" step="0.1"/></div>
      <div class="efg"><label>Term</label><input id="e_term" type="number" value="${s.term}"/></div>
      <div class="efg"><label>Close%</label><input id="e_close" type="number" value="${s.close}"/></div>
      <button class="rc-btn" onclick="recalc()">&#x21BB; Recalculate</button>
      <button class="rc-btn" style="background:#555;" onclick="resetAssumptions()">&#8635; Reset</button>
    </div>

    <div class="sec">
      <div class="stl">Financial Returns</div>
      <div class="kgrd">
        <div class="kb" style="background:#dcfce7;"><div class="kv" style="color:#166534;" id="r_cf">${f$(CALC.net)}</div><div class="kl" style="color:#166534;">Cash Flow/mo</div></div>
        <div class="kb" style="background:#dbeafe;"><div class="kv" style="color:#1e40af;" id="r_cap">${fp(CALC.cap)}</div><div class="kl" style="color:#1e40af;">Cap Rate</div></div>
        <div class="kb" style="background:#ede9fe;"><div class="kv" style="color:#5b21b6;" id="r_coc">${fp(CALC.coc)}</div><div class="kl" style="color:#5b21b6;">Cash on Cash</div></div>
        <div class="kb" style="background:#fef3c7;"><div class="kv" style="color:#92400e;" id="r_irr">${fp(CALC.irr)}</div><div class="kl" style="color:#92400e;">IRR (Est.)</div></div>
      </div>
      <div class="two">
        <div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#374151;margin-bottom:8px;border-bottom:1px solid #e5e7eb;padding-bottom:4px;">Financing</div>
          <div class="irow"><span class="il">Purchase Price</span><span class="iv">${f$(p.price)}</span></div>

function downloadPDF() {
  const btn = document.getElementById('pdf-btn');
  btn.textContent = 'Generating...';
  btn.disabled = true;
  const el = document.getElementById('report-body');
  html2canvas(el, {scale:2, useCORS:true, logging:false, allowTaint:true}).then(canvas => {
    const pdf = new window.jspdf.jsPDF('p','mm','a4');
    const pw = pdf.internal.pageSize.getWidth();
    const ph = pdf.internal.pageSize.getHeight();
    // margins
    const margin = 8; // mm each side
    const usableW = pw - margin * 2;
    const usableH = ph - margin * 2;
    // px per mm on canvas
    const pxPerMmW = canvas.width / pw;
    const pxPerMmH = pxPerMmW; // same scale
    const pageHeightPx = usableH * pxPerMmH;
    const totalPages = Math.ceil(canvas.height / pageHeightPx);

    for (let pg = 0; pg < totalPages; pg++) {
      if (pg > 0) pdf.addPage();
      // Slice canvas for this page
      const srcY = Math.round(pg * pageHeightPx);
      const srcH = Math.min(pageHeightPx, canvas.height - srcY);
      const sliceCanvas = document.createElement('canvas');
      sliceCanvas.width = canvas.width;
      sliceCanvas.height = srcH;
      const ctx = sliceCanvas.getContext('2d');
      ctx.drawImage(canvas, 0, srcY, canvas.width, srcH, 0, 0, canvas.width, srcH);
      const imgData = sliceCanvas.toDataURL('image/jpeg', 0.92);
      const sliceHeightMm = srcH / pxPerMmH;
      pdf.addImage(imgData, 'JPEG', margin, margin, usableW, sliceHeightMm);
    }
    pdf.save('LegacyInvest_Report.pdf');
    btn.innerHTML = '&#11015; Download PDF';
    btn.disabled = false;
  }).catch(err => {
    alert('PDF generation failed. Please use Print instead.');
    btn.innerHTML = '&#11015; Download PDF';
    btn.disabled = false;
  });
}

    barEl.style.width = '100%'; statEl.textContent = 'Contract sent! ✓';
    setTimeout(function() {
      document.getElementById('pfLeviOverlay').classList.remove('open');
      document.getElementById('pfReserveModal').innerHTML =
        '<div style="text-align:center;padding:28px 0;">' +
        '<div style="width:52px;height:52px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">' +
        '<svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="#16a34a" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg></div>' +
        '<div style="font-size:16px;font-weight:700;color:#111;margin-bottom:6px;">Purchase Agreement Sent!</div>' +
        '<div style="font-size:11px;color:#888;margin-bottom:20px;">Check your email to review and e-sign your agreement for ' + p.addr + '.</div>' +
        '<button onclick="pfCloseReserve()" style="background:#22c55e;color:white;border:none;border-radius:6px;padding:8px 20px;font-size:11px;font-weight:700;cursor:pointer;">Done</button></div>';
    }, 700);
  }).catch(function() {
    clearInterval(fTimer); clearInterval(pTimer);
    document.getElementById('pfLeviOverlay').classList.remove('open');
    if (btn) { btn.disabled = false; btn.textContent = '✓ Submit & Send Purchase Agreement'; }
    document.getElementById('pfReserveModal').innerHTML =
      '<div style="text-align:center;padding:28px 0;">' +
      '<div style="font-size:16px;font-weight:700;color:#ef4444;margin-bottom:8px;">Something went wrong</div>' +
      '<div style="font-size:11px;color:#888;margin-bottom:20px;">Please try again or contact Taylor@legacyinvest.net.</div>' +
      '<button onclick="pfCloseReserve()" style="background:#111;color:white;border:none;border-radius:6px;padding:8px 20px;font-size:11px;cursor:pointer;">Close</button></div>';
  });
}
</script>

<div id="li-chat-bubble" onclick="liChatToggle()" title="Chat with Levi — AI Property Advisor">
  <svg viewBox="0 0 24 24"><path d="M12 3C6.48 3 2 6.92 2 11.7c0 2.67 1.33 5.06 3.43 6.67L4 21l3.63-1.86C8.97 19.65 10.45 20 12 20c5.52 0 10-3.92 10-8.7S17.52 3 12 3z"/></svg>
  <span class="li-chat-badge" id="li-chat-badge">1</span>
</div>
<div id="li-chat-panel">
  <div id="li-chat-header">
    <div>
      <div class="li-ch-title">🏠 Levi — Legacy Invest Advisor</div>
      <div class="li-ch-sub">AI-powered · Ask me anything</div>
    </div>
    <button id="li-chat-close" onclick="liChatToggle()">&#x2715;</button>
  </div>
  <div id="li-chat-messages"></div>
  <div id="li-chat-input-row">
    <textarea id="li-chat-input" placeholder="Ask about this property or investment strategy..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();liChatSend();}"></textarea>
    <button id="li-chat-send" onclick="liChatSend()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
<script>
(function(){
  var LI_CHAT = { open: false, history: [], greeted: false };
  var PROP_DATA = null;
  try { var raw = decodeURIComponent(location.hash.slice(1)); PROP_DATA = JSON.parse(raw).p; } catch(e){}

  function liChatToggle() {
    LI_CHAT.open = !LI_CHAT.open;
    var panel = document.getElementById('li-chat-panel');
    var badge = document.getElementById('li-chat-badge');
    panel.classList.toggle('open', LI_CHAT.open);
    badge.style.display = 'none';
    if (LI_CHAT.open && !LI_CHAT.greeted) {
      LI_CHAT.greeted = true;
      var greeting = PROP_DATA
        ? 'Hey! I\'m **Levi**, Legacy Invest\'s AI advisor. I can see you\'re looking at the proforma for **' + PROP_DATA.addr + ', ' + PROP_DATA.city + '** — $' + Number(PROP_DATA.price).toLocaleString() + ' asking price.\n\nDo you have any questions about the numbers, or are you ready to talk about moving forward?'
        : 'Hey! I\'m **Levi**, Legacy Invest\'s AI property advisor. I can help you understand the numbers, talk through your investment strategy, or help you get started. What\'s on your mind?';
      liAddMsg('bot', greeting);
    }
    if (LI_CHAT.open) setTimeout(function(){ document.getElementById('li-chat-input').focus(); }, 100);
  }
  window.liChatToggle = liChatToggle;

  setTimeout(function(){ var b = document.getElementById('li-chat-badge'); if (!LI_CHAT.open) b.style.display = 'block'; }, 4000);

  function liAddMsg(role, text) {
    var msgs = document.getElementById('li-chat-messages');
    var wrap = document.createElement('div'); wrap.className = 'li-msg ' + role;
    var bubble = document.createElement('div'); bubble.className = 'li-msg-bubble';
    bubble.innerHTML = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')
      .replace(/\[SCHEDULE:([^\]]+)\]/g, function(m,url){ return '<a href="'+url+'" target="_blank" style="display:inline-flex;align-items:center;gap:5px;background:#1a2f5e;color:white;border-radius:7px;padding:7px 13px;font-size:11px;font-weight:700;text-decoration:none;margin-top:6px;">📅 Book a time with Taylor</a>'; });
    wrap.appendChild(bubble);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    LI_CHAT.history.push({ role: role === 'user' ? 'user' : 'assistant', content: text });
  }

  function liShowTyping() {
    var msgs = document.getElementById('li-chat-messages');
    var wrap = document.createElement('div'); wrap.className = 'li-msg bot'; wrap.id = 'li-typing-indicator';
    var t = document.createElement('div'); t.className = 'li-typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(t); msgs.appendChild(wrap); msgs.scrollTop = msgs.scrollHeight;
  }
  function liRemoveTyping() { var el = document.getElementById('li-typing-indicator'); if (el) el.remove(); }

  window.liChatSend = async function() {
    var input = document.getElementById('li-chat-input');
    var text = input.value.trim(); if (!text) return;
    input.value = ''; liAddMsg('user', text); liShowTyping();

    var propContext = PROP_DATA
      ? 'The investor is currently viewing the proforma for: ' + PROP_DATA.addr + ', ' + PROP_DATA.city + ', ' + PROP_DATA.state + ' ' + PROP_DATA.zip
        + ' | Price: $' + Number(PROP_DATA.price).toLocaleString()
        + ' | ' + PROP_DATA.beds + 'bd/' + PROP_DATA.baths + 'ba | ' + Number(PROP_DATA.sqft).toLocaleString() + ' sf | Built ' + PROP_DATA.yr
        + ' | Rent: $' + PROP_DATA.rent + '/mo | Taxes: $' + PROP_DATA.taxes + '/yr | Status: ' + PROP_DATA.status
      : 'The investor is viewing a Legacy Invest proforma report.';

    var systemPrompt = 'You are Levi, the AI investment advisor for Legacy Invest — a company specializing in buy-and-hold rental properties in Memphis, TN and St. Louis, MO. You have a confident, knowledgeable but approachable tone.\n\nYour role:\n- Answer questions about the specific property they are viewing\n- Help them understand the financial metrics (cash flow, cap rate, CoC, NOI)\n- Encourage them to move forward if they seem interested — tell them to click the Reserve button on the proforma\n- Offer to schedule a call with Taylor if they want to discuss further\n- Use this format for scheduling: [SCHEDULE:https://legacyinvest.pipedrive.com/scheduler/lp4RdKhm/meeting-with-taylor]\n- Legacy Invest offers: 2% credit at closing, 2-month rental guarantee, 90-day maintenance warranty, 1-year mechanical warranty, 1 year free property management\n- Keep responses to 3-5 sentences max unless asked for detail\n- Taylor is a he/him.\n\n' + propContext;

    var messages = LI_CHAT.history.filter(function(m){ return m.role==='user'||m.role==='assistant'; }).slice(-10);
    try {
      var res = await fetch('https://legacyinvest.app.n8n.cloud/webhook/marketplace-chat', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ system: systemPrompt, messages: messages })
      });
      var data = await res.json();
      liRemoveTyping();
      liAddMsg('bot', data.reply || 'Sorry, I had trouble responding. Please try again.');
    } catch(e) {
      liRemoveTyping();
      liAddMsg('bot', 'Sorry, something went wrong. Please try again in a moment.');
    }
  };
})();
</script>
</body>
</html>
