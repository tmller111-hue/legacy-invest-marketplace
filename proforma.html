<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Legacy Invest — Property Report</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:#f5f4f0;color:#111;font-size:12px;}
.action-bar{background:#1a2f5e;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.action-bar h1{color:white;font-size:13px;font-weight:600;flex:1;}
.btn{border:none;border-radius:6px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;}
.btn-pdf{background:#c9a227;color:white;}
.btn-print{background:#555;color:white;}
.btn-back{background:transparent;color:white;border:1px solid rgba(255,255,255,0.4);cursor:pointer;font-family:inherit;border-radius:6px;padding:8px 14px;font-size:12px;}
.btn:disabled{opacity:0.6;cursor:wait;}
@media print{.action-bar{display:none!important;}body{background:white;}}
.wrap{max-width:900px;margin:0 auto;background:white;}
.hero{position:relative;height:220px;overflow:hidden;background:#ddd;}
.hero img{width:100%;height:100%;object-fit:cover;}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1),rgba(0,0,0,.7));}
.hero-txt{position:absolute;bottom:20px;left:22px;color:white;right:22px;}
.hero-txt .pr{font-family:"Playfair Display",serif;font-size:26px;font-weight:700;}
.hero-txt .ad{font-size:11px;opacity:.9;margin-top:3px;}
.edit-bar{background:#1a2f5e;padding:10px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ebt{color:white;font-size:10px;font-weight:700;text-transform:uppercase;margin-right:4px;}
.efg{display:flex;align-items:center;gap:3px;}
.efg label{color:#93c5fd;font-size:9px;text-transform:uppercase;}
.efg input{width:58px;padding:3px 5px;border:1px solid #3b82f6;border-radius:4px;background:#0f172a;color:white;font-size:11px;text-align:center;font-family:inherit;}
.rc-btn{background:#c9a227;color:white;border:none;border-radius:5px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;margin-left:auto;font-family:inherit;}
.sec{padding:16px 22px;border-bottom:1px solid #e5e7eb;}
.stl{font-family:"Playfair Display",serif;font-size:13px;font-weight:700;color:#1a2f5e;margin-bottom:12px;display:flex;align-items:center;gap:5px;}
.stl::after{content:"";flex:1;height:1px;background:#dbeafe;}
.kgrd{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:16px;}
.kb{border-radius:7px;padding:12px;text-align:center;}
.kv{font-family:"Playfair Display",serif;font-size:18px;font-weight:700;}
.kl{font-size:9px;text-transform:uppercase;margin-top:3px;opacity:.8;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.irow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f3f4f6;font-size:11px;}
.il{color:#6b7280;}
.iv{font-weight:600;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:#1a2f5e;color:white;padding:7px 9px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;}
td{padding:5px 9px;border-bottom:1px solid #f0f2f5;text-align:right;}
td:first-child{text-align:center;font-weight:700;}
tr:nth-child(even){background:#f8fafc;}
.proj-chart{height:140px;background:#f8fafc;border-radius:8px;margin-bottom:10px;padding:8px 8px 0;display:flex;align-items:flex-end;gap:3px;}
.chart-btns{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.cbtn{padding:4px 10px;font-size:10px;border-radius:20px;cursor:pointer;font-family:inherit;border:1px solid #ddd;background:white;color:#555;}
.cbtn.on{background:#16a34a;color:white;border-color:#16a34a;}
.cta-sec{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #86efac;border-radius:10px;padding:20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
.res-btn{background:#c9a227;color:white;border:none;border-radius:8px;padding:12px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.foot{padding:16px 22px;display:flex;justify-content:space-between;align-items:center;background:#1a2f5e;color:white;font-size:10px;flex-wrap:wrap;gap:8px;}
.loading{text-align:center;padding:80px;font-size:16px;color:#888;}
@media(max-width:600px){.kgrd{grid-template-columns:repeat(2,1fr);}.two{grid-template-columns:1fr;}.edit-bar{flex-direction:column;align-items:flex-start;}}
@media print{.edit-bar{display:none!important;}body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
</style>
</head>
<body>

<div class="action-bar">
  <h1 id="action-title">Legacy Invest — Property Report</h1>
  <button class="btn btn-pdf" id="pdf-btn" onclick="downloadPDF()">&#11015; Download PDF</button>
  <button class="btn btn-print" onclick="window.print()">&#128424; Print</button>
</div>

<div id="report-content">
  <div class="loading">Loading report...</div>
</div>

<script>
const f$ = n => '$' + Math.round(n).toLocaleString();
const fp = n => n.toFixed(2) + '%';
const gi = id => parseFloat(document.getElementById(id)?.value) || 0;
const set = (id, v) => { const e = document.getElementById(id); if(e) e.textContent = v; };

let PROP = null;
let CALC = null;

function calc(p, s) {
  const g = s.rent * (1 - s.vac/100);
  const ma = g * s.mgmt/100, xa = s.rent * s.maintPct/100;
  const noi = g - p.taxes/12 - p.ins - ma - xa;
  const ln = p.price * (1 - s.down/100);
  const r = s.rate/100/12, n = s.term * 12;
  const mo = r > 0 ? ln*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1) : ln/n;
  const net = noi - mo;
  const da = p.price * s.down/100, ca = p.price * s.close/100, oop = da + ca;
  const cap = p.price > 0 ? (noi*12/p.price)*100 : 0;
  const coc = oop > 0 ? (net*12/oop)*100 : 0;
  const irr = Math.max(0, coc*1.75 + cap*0.3);
  return {g, noi, mo, net, ln, oop, cap, coc, irr, da, ca, ma, xa};
}

function buildProjections(p, s, c) {
  const data = [];
  let cumCF = 0;
  const r = s.rate/100/12, n = s.term*12, ln = c.ln;
  for (let yr = 1; yr <= 10; yr++) {
    const rentY = s.rent * Math.pow(1.03, yr-1);
    const grossY = rentY * (1 - s.vac/100);
    const noiY = grossY - (p.taxes/12 * Math.pow(1.02,yr-1)) - (p.ins * Math.pow(1.02,yr-1)) - (grossY*s.mgmt/100) - (rentY*s.maintPct/100);
    const cfY = (noiY - c.mo) * 12;
    cumCF += cfY;
    const propVal = p.price * Math.pow(1.03, yr);
    const appGain = propVal - p.price;
    // Equity paydown: loan balance after yr*12 payments
    const loanBal = r > 0 ? ln * (Math.pow(1+r, n) - Math.pow(1+r, yr*12)) / (Math.pow(1+r, n) - 1) : Math.max(0, ln - c.mo*yr*12);
    const equityGain = (ln - loanBal); // principal paid down
    // Total wealth created = cumulative cash flow + appreciation + equity paydown - initial OOP
    const totalWealth = cumCF + appGain + equityGain;
    data.push({yr, rent:rentY, noi:noiY*12, cf:cfY, cumCF, propVal, appGain, equityGain, totalWealth});
  }
  return data;
}

let PROJ = [];
let PROJ_METRIC = 'cf';
const COLORS = {cf:'#16a34a', cum:'#1a2f5e', val:'#2563eb', tw:'#7c3aed'};

function buildChart() {
  const chart = document.getElementById('proj-chart');
  if (!chart) return;
  const vals = PROJ.map(d => PROJ_METRIC==='cf'?d.cf : PROJ_METRIC==='cum'?d.cumCF : PROJ_METRIC==='tw'?d.totalWealth : d.propVal);
  const maxV = Math.max(...vals.map(Math.abs)) || 1;
  chart.innerHTML = vals.map((v, i) => {
    const h = Math.round(Math.abs(v)/maxV * 110);
    const col = v < 0 ? '#ef4444' : COLORS[PROJ_METRIC];
    const lbl = PROJ_METRIC==='val' ? '$'+Math.round(v/1000)+'k' : '$'+Math.round(Math.abs(v)).toLocaleString();
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px;cursor:pointer;" onclick="hlRow(${PROJ[i].yr})">
      <div style="font-size:8px;color:#555;font-weight:600;">${lbl}</div>
      <div style="width:100%;background:${col};border-radius:3px 3px 0 0;height:${h}px;min-height:3px;transition:all 0.3s;"></div>
      <div style="font-size:8px;color:#888;">Yr ${PROJ[i].yr}</div>
    </div>`;
  }).join('');
}

function projView(m) {
  PROJ_METRIC = m;
  document.querySelectorAll('.cbtn').forEach(b => {
    b.className = 'cbtn' + (b.dataset.m === m ? ' on' : '');
    if (b.dataset.m === m) {
      b.style.background = COLORS[m];
      b.style.borderColor = COLORS[m];
      b.style.color = 'white';
    } else {
      b.style.background = 'white';
      b.style.borderColor = '#ddd';
      b.style.color = '#555';
    }
  });
  buildChart();
}

function hlRow(yr) {
  document.querySelectorAll('#proj-tbody tr').forEach((r, i) => {
    const isSelected = PROJ[i]?.yr === yr;
    r.style.background = isSelected ? '#fef3c7' : (i%2===0 ? '#f8fafc' : 'white');
    r.style.fontWeight = isSelected ? '600' : '';
  });
}

function recalc() {
  if (!PROP) return;
  const s = {
    rent: gi('e_rent'), vac: gi('e_vac'), mgmt: gi('e_mgmt'), maintPct: gi('e_maint'),
    down: gi('e_down'), rate: gi('e_rate'), term: gi('e_term'), close: gi('e_close')
  };
  CALC = calc(PROP, s);
  PROJ = buildProjections(PROP, s, CALC);

  // Update KPIs
  set('r_cf', f$(CALC.net));
  set('r_cap', fp(CALC.cap));
  set('r_coc', fp(CALC.coc));
  set('r_irr', fp(CALC.irr));

  // Update income table
  set('r_rent', f$(s.rent));
  set('r_eff', f$(CALC.g));
  set('r_noi', f$(CALC.noi));
  set('r_mort', f$(CALC.mo));
  const rnt = document.getElementById('r_net');
  if (rnt) { rnt.textContent = f$(CALC.net); rnt.style.color = CALC.net>=0?'#16a34a':'#ef4444'; }

  // Update financing
  set('r_down', f$(CALC.da));
  set('r_close', f$(CALC.ca));
  set('r_oop', f$(CALC.oop));
  set('r_loan', f$(CALC.ln));
  set('r_payment', f$(CALC.mo));

  // Update label suffixes
  const el_vl = document.getElementById('l_vac'); if (el_vl) el_vl.textContent = 'Vacancy ('+s.vac+'%)';
  const el_ml = document.getElementById('l_mgmt'); if (el_ml) el_ml.textContent = 'Mgmt ('+s.mgmt+'%)';
  const el_xl = document.getElementById('l_maint'); if (el_xl) el_xl.textContent = 'Maint ('+s.maintPct+'%)';
  const el_dl = document.getElementById('l_down'); if (el_dl) el_dl.textContent = 'Down ('+s.down+'%)';
  const el_cl = document.getElementById('l_close'); if (el_cl) el_cl.textContent = 'Closing ('+s.close+'%)';

  // Rebuild projection table
  const tbody = document.getElementById('proj-tbody');
  if (tbody) {
    tbody.innerHTML = PROJ.map(d => {
      const cfCol = d.cf>=0?'#16a34a':'#ef4444';
      const cumCol = d.cumCF>=0?'#16a34a':'#ef4444';
      const twCol = d.totalWealth>=0?'#7c3aed':'#ef4444';
      return `<tr onclick="hlRow(${d.yr})" style="cursor:pointer;">
        <td style="text-align:center;font-weight:700;padding:6px 8px;">${d.yr}</td>
        <td style="padding:6px 8px;">${f$(d.rent)}/mo</td>
        <td style="padding:6px 8px;">${f$(d.noi)}/yr</td>
        <td style="font-weight:600;color:${cfCol};padding:6px 8px;">${f$(d.cf)}/yr</td>
        <td style="font-weight:700;color:${cumCol};padding:6px 8px;">${f$(d.cumCF)}</td>
        <td style="padding:6px 8px;">${f$(d.propVal)}</td>
        <td style="color:#2563eb;font-weight:600;padding:6px 8px;">${f$(d.appGain)}</td>
        <td style="color:#0891b2;font-weight:600;padding:6px 8px;">${f$(d.equityGain)}</td>
        <td style="font-weight:700;color:${twCol};padding:6px 8px;">${f$(d.totalWealth)}</td>
      </tr>`;
    }).join('');
  }
  buildChart();
}

function render(p, s) {
  PROP = p;
  CALC = calc(p, s);
  PROJ = buildProjections(p, s, CALC);

  document.title = 'Report — ' + p.addr;
  document.getElementById('action-title').textContent = p.addr + ' · ' + f$(p.price);

  const html = `
  <div class="wrap" id="report-body">
    <div class="hero">
      <img src="${p.photos[0]}" onerror="this.style.display='none'"/>
      <div class="hero-ov"></div>
      <div class="hero-txt">
        <div class="pr">${f$(p.price)}</div>
        <div class="ad">${p.addr}, ${p.city}, ${p.state} ${p.zip}</div>
      </div>
    </div>

    <div class="edit-bar">
      <span class="ebt">Edit Assumptions</span>
      <div class="efg"><label>Rent</label><input id="e_rent" type="number" value="${s.rent}"/></div>
      <div class="efg"><label>Vac%</label><input id="e_vac" type="number" value="${s.vac}"/></div>
      <div class="efg"><label>Mgmt%</label><input id="e_mgmt" type="number" value="${s.mgmt}"/></div>
      <div class="efg"><label>Maint%</label><input id="e_maint" type="number" value="${s.maintPct}"/></div>
      <div class="efg"><label>Down%</label><input id="e_down" type="number" value="${s.down}"/></div>
      <div class="efg"><label>Rate%</label><input id="e_rate" type="number" value="${s.rate}" step="0.1"/></div>
      <div class="efg"><label>Term</label><input id="e_term" type="number" value="${s.term}"/></div>
      <div class="efg"><label>Close%</label><input id="e_close" type="number" value="${s.close}"/></div>
      <button class="rc-btn" onclick="recalc()">&#x21BB; Recalculate</button>
      <button class="rc-btn" style="background:#555;" onclick="resetAssumptions()">&#8635; Reset</button>
    </div>

    <div class="sec">
      <div class="stl">Financial Returns</div>
      <div class="kgrd">
        <div class="kb" style="background:#dcfce7;"><div class="kv" style="color:#166534;" id="r_cf">${f$(CALC.net)}</div><div class="kl" style="color:#166534;">Cash Flow/mo</div></div>
        <div class="kb" style="background:#dbeafe;"><div class="kv" style="color:#1e40af;" id="r_cap">${fp(CALC.cap)}</div><div class="kl" style="color:#1e40af;">Cap Rate</div></div>
        <div class="kb" style="background:#ede9fe;"><div class="kv" style="color:#5b21b6;" id="r_coc">${fp(CALC.coc)}</div><div class="kl" style="color:#5b21b6;">Cash on Cash</div></div>
        <div class="kb" style="background:#fef3c7;"><div class="kv" style="color:#92400e;" id="r_irr">${fp(CALC.irr)}</div><div class="kl" style="color:#92400e;">IRR (Est.)</div></div>
      </div>
      <div class="two">
        <div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#374151;margin-bottom:8px;border-bottom:1px solid #e5e7eb;padding-bottom:4px;">Financing</div>
          <div class="irow"><span class="il">Purchase Price</span><span class="iv">${f$(p.price)}</span></div>
          <div class="irow"><span class="il" id="l_down">Down (${s.down}%)</span><span id="r_down" class="iv" style="color:#3b82f6;">${f$(CALC.da)}</span></div>
          <div class="irow"><span class="il" id="l_close">Closing (${s.close}%)</span><span id="r_close" class="iv" style="color:#c9a227;">${f$(CALC.ca)}</span></div>
          <div class="irow"><span class="il">Total Out of Pocket</span><span id="r_oop" style="font-weight:700;color:#7c3aed;">${f$(CALC.oop)}</span></div>
          <div class="irow"><span class="il">Loan Amount</span><span id="r_loan" class="iv">${f$(CALC.ln)}</span></div>
          <div class="irow"><span class="il">Monthly Payment</span><span id="r_payment" style="font-weight:700;color:#ef4444;">${f$(CALC.mo)}</span></div>
        </div>
        <div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#374151;margin-bottom:8px;border-bottom:1px solid #e5e7eb;padding-bottom:4px;">Monthly Income &amp; Expenses</div>
          <div class="irow"><span class="il">Gross Rent</span><span id="r_rent" style="color:#16a34a;">${f$(s.rent)}</span></div>
          <div class="irow"><span class="il" id="l_vac">Vacancy (${s.vac}%)</span><span style="color:#ef4444;">&minus;${f$(Math.round(s.rent*s.vac/100))}</span></div>
          <div class="irow"><span class="il">Effective Income</span><span id="r_eff" style="color:#16a34a;font-weight:700;">${f$(CALC.g)}</span></div>
          <div class="irow"><span class="il">Annual Taxes/mo</span><span style="color:#ef4444;">&minus;${f$(Math.round(p.taxes/12))}</span></div>
          <div class="irow"><span class="il">Insurance/mo</span><span style="color:#ef4444;">&minus;${f$(Math.round(p.ins))}</span></div>
          <div class="irow"><span class="il" id="l_mgmt">Mgmt (${s.mgmt}%)</span><span style="color:#ef4444;">&minus;${f$(Math.round(CALC.ma))}</span></div>
          <div class="irow"><span class="il" id="l_maint">Maint (${s.maintPct}%)</span><span style="color:#ef4444;">&minus;${f$(Math.round(CALC.xa))}</span></div>
          <div class="irow"><span class="il">Net Operating Income</span><span id="r_noi" style="color:#2563eb;font-weight:700;">${f$(CALC.noi)}</span></div>
          <div class="irow"><span class="il">Mortgage Payment</span><span style="color:#ef4444;">&minus;${f$(Math.round(CALC.mo))}</span></div>
          <div class="irow" style="border-top:2px solid #e5e7eb;padding-top:5px;"><span class="il" style="font-weight:700;">Net Cash Flow</span><span id="r_net" style="font-weight:700;color:${CALC.net>=0?'#16a34a':'#ef4444'};">${f$(CALC.net)}</span></div>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="stl">Property Details</div>
      <div class="two">
        <div>
          <div class="irow"><span class="il">Bedrooms</span><span class="iv">${p.beds}</span></div>
          <div class="irow"><span class="il">Bathrooms</span><span class="iv">${p.baths}</span></div>
          <div class="irow"><span class="il">Square Feet</span><span class="iv">${p.sqft?.toLocaleString()}</span></div>
          <div class="irow"><span class="il">Year Built</span><span class="iv">${p.yr}</span></div>
          <div class="irow"><span class="il">Basement</span><span class="iv">${p.basement||'None'}</span></div>
          <div class="irow"><span class="il">Status</span><span class="iv">${p.status}</span></div>
          <div class="irow"><span class="il">Occupancy</span><span class="iv">${p.occupancy||p.occ}</span></div>
        </div>
        <div>
          <div class="irow"><span class="il">Annual Taxes</span><span class="iv">${f$(p.taxes)}</span></div>
          <div class="irow"><span class="il">Annual Insurance</span><span class="iv">${f$(p.ins*12)}</span></div>
          <div class="irow"><span class="il">Monthly Rent</span><span class="iv">${f$(s.rent)}</span></div>
          <div class="irow"><span class="il">Annual Cash Flow</span><span class="iv" style="color:#16a34a;">${f$(CALC.net*12)}</span></div>
          <div class="irow"><span class="il">Total Out of Pocket</span><span class="iv" style="color:#7c3aed;">${f$(CALC.oop)}</span></div>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="stl">10-Year Projections</div>
      <p style="font-size:10px;color:#6b7280;margin-bottom:12px;">Assumes 3% annual rent growth &bull; 2% expense inflation &bull; 3% property appreciation. Mortgage payment stays fixed.</p>
      <div class="proj-chart" id="proj-chart"></div>
      <div class="chart-btns">
        <button class="cbtn on" data-m="cf" onclick="projView('cf')" style="background:#16a34a;color:white;border-color:#16a34a;">Annual Cash Flow</button>
        <button class="cbtn" data-m="cum" onclick="projView('cum')">Cumulative CF</button>
        <button class="cbtn" data-m="val" onclick="projView('val')">Property Value</button>
        <button class="cbtn" data-m="tw" onclick="projView('tw')">Total Wealth Built</button>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead><tr>
            <th style="text-align:center;padding:8px;">Year</th>
            <th style="padding:8px;">Monthly Rent</th>
            <th style="padding:8px;">Annual NOI</th>
            <th style="padding:8px;">Cash Flow/yr</th>
            <th style="padding:8px;">Cumulative CF</th>
            <th style="padding:8px;">Property Value</th>
            <th style="padding:8px;">Appreciation</th>
            <th style="padding:8px;">Equity Paydown</th>
            <th style="padding:8px;">Total Wealth Built</th>
          </tr></thead>
          <tbody id="proj-tbody">
            ${PROJ.map(d => {
              const cfCol = d.cf>=0?'#16a34a':'#ef4444';
              const cumCol = d.cumCF>=0?'#16a34a':'#ef4444';
              const twCol = d.totalWealth>=0?'#7c3aed':'#ef4444';
              return `<tr onclick="hlRow(${d.yr})" style="cursor:pointer;">
                <td style="text-align:center;font-weight:700;padding:6px 8px;">${d.yr}</td>

function downloadPDF() {
  const btn = document.getElementById('pdf-btn');
  btn.textContent = 'Generating...';
  btn.disabled = true;
  const el = document.getElementById('report-body');
  html2canvas(el, {scale:2, useCORS:true, logging:false, allowTaint:true}).then(canvas => {
    const pdf = new window.jspdf.jsPDF('p','mm','a4');
    const pw = pdf.internal.pageSize.getWidth();
    const ph = pdf.internal.pageSize.getHeight();
    // margins
    const margin = 8; // mm each side
    const usableW = pw - margin * 2;
    const usableH = ph - margin * 2;
    // px per mm on canvas
    const pxPerMmW = canvas.width / pw;
    const pxPerMmH = pxPerMmW; // same scale
    const pageHeightPx = usableH * pxPerMmH;
    const totalPages = Math.ceil(canvas.height / pageHeightPx);

    for (let pg = 0; pg < totalPages; pg++) {
      if (pg > 0) pdf.addPage();
      // Slice canvas for this page
      const srcY = Math.round(pg * pageHeightPx);
      const srcH = Math.min(pageHeightPx, canvas.height - srcY);
      const sliceCanvas = document.createElement('canvas');
      sliceCanvas.width = canvas.width;
      sliceCanvas.height = srcH;
      const ctx = sliceCanvas.getContext('2d');
      ctx.drawImage(canvas, 0, srcY, canvas.width, srcH, 0, 0, canvas.width, srcH);
      const imgData = sliceCanvas.toDataURL('image/jpeg', 0.92);
      const sliceHeightMm = srcH / pxPerMmH;
      pdf.addImage(imgData, 'JPEG', margin, margin, usableW, sliceHeightMm);
    }
    pdf.save('LegacyInvest_Report.pdf');
    btn.innerHTML = '&#11015; Download PDF';
    btn.disabled = false;
  }).catch(err => {
    alert('PDF generation failed. Please use Print instead.');
    btn.innerHTML = '&#11015; Download PDF';
    btn.disabled = false;
  });
}

// Load property data from URL hash
function resetAssumptions() {
  if (!PROP) return;
  const s = JSON.parse(decodeURIComponent(window.location.hash.slice(1))).s;
  ['e_rent','e_vac','e_mgmt','e_maint','e_down','e_rate','e_term','e_close'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const key = id.replace('e_','');
    if (s[key] !== undefined) el.value = s[key];
  });
  recalc();
}

function loadFromHash() {
  try {
    const hash = window.location.hash.slice(1);
    if (!hash) { document.getElementById('report-content').innerHTML = '<div class="loading">No property data found. Please open this page from the marketplace.</div>'; return; }
    const data = JSON.parse(decodeURIComponent(hash));
    render(data.p, data.s);
  } catch(e) {
    document.getElementById('report-content').innerHTML = '<div class="loading">Error loading property data: ' + e.message + '</div>';
  }
}

loadFromHash();
